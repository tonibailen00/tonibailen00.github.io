<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2>Mis Test Guardados</h2>
      <p>Gestiona y administra tus cuestionarios locales.</p>
    </div>
    <div class="header-actions-row">
      <label class="btn-import">
        Cargar JSON
        <input type="file" accept="application/json,.json" (change)="importFromJson($event)" style="display:none;" />
      </label>
    </div>
  </div>

  <div *ngIf="loading()" class="loading">Cargando...</div>

  <div *ngIf="!loading() && quizzes().length === 0" class="glass-panel empty-state">
    <p>No tienes ningún cuestionario guardado.</p>
    <button class="btn-glass btn-glass-primary btn-primary" (click)="goToCreate()">Crear uno nuevo</button>
  </div>

  <div class="card-grid">
    <div *ngFor="let quiz of quizzes()" class="grid-card glass-panel">
      <div class="card-header-row">
        <div class="quiz-info">
          <h3>{{ quiz.title }}</h3>
          <p class="subtitle">{{ quiz.questions.length }} preguntas • {{ quiz.date | date:'dd/MM/yyyy HH:mm' }}</p>
        </div>
        <div class="card-actions">
          <button class="icon-btn btn-edit" (click)="editQuiz(quiz.id)" title="Editar"><i
              class="ph-bold ph-pencil-simple"></i></button>
          <button class="icon-btn btn-export" (click)="exportToJson(quiz)" title="Descargar JSON"><i
              class="ph-bold ph-download-simple"></i></button>
          <button class="icon-btn btn-delete" (click)="deleteQuiz(quiz.id)" title="Eliminar"><i
              class="ph-bold ph-trash"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
