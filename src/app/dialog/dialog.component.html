@if (ui.dialogState(); as state) {
<div class="modal-overlay" [class.closing]="ui.isClosing()">
  <div class="modal-content modal-small">
    <div class="modal-header">
      <h3>
        @if (state.icon) {
        <span class="icon-header"><i [class]="state.icon"></i></span>
        }
        {{ state.title }}
      </h3>
      <button class="btn-close" (click)="cancel()"><i class="ph ph-x"></i></button>
    </div>
    <div class="modal-body">
      <p class="modal-instruction">{{ state.message }}</p>
      @if (state.type === 'prompt') {
      <div class="search-container no-margin">
        <input type="text" class="search-input" [(ngModel)]="state.inputValue"
          [placeholder]="state.inputPlaceholder || ''" (keyup.enter)="confirm()" />
      </div>
      }
    </div>
    <div class="modal-footer action-footer">
      @if (state.type !== 'alert') {
      <button class="btn-cancel" (click)="cancel()">Cancelar</button>
      }
      <button class="btn-confirm" [disabled]="state.type === 'prompt' && !state.inputValue?.trim()" (click)="confirm()">
        {{ state.confirmText || 'Aceptar' }}
      </button>
    </div>
  </div>
</div>
}
